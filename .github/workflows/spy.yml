name: Refresh SPY chart

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install --quiet matplotlib==3.9.2 requests==2.32.3
      - name: Render SPY chart from Yahoo Finance
        run: python .github/scripts/refresh_spy.py
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain assets/spy.png)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/spy.png
            git commit -m "chore: refresh SPY chart"
            git push
          else
            echo "no changes"
          fi
